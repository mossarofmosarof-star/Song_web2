<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Music Card</title>

<!-- Premium Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
}

/* Box */
.card {
    width: 300px;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    background: #111;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
}

/* LED border */
.card::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    background: linear-gradient(45deg, red, blue, lime, yellow, cyan);
    z-index: -1;
    filter: blur(10px);
    animation: glow 3s linear infinite;
}

@keyframes glow {
    0% {filter: hue-rotate(0deg);}
    100% {filter: hue-rotate(360deg);}
}

/* Name */
.name {
    font-size: 28px;
    font-weight: 900;
    color: white;
    letter-spacing: 3px;
    margin-bottom: 15px;
    text-shadow: 0 0 15px cyan;
}

/* Image */
.img-box {
    width: 150px;
    height: 150px;
    margin: auto;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid cyan;
    transition: 0.3s;
}

.img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Animation */
.playing .img-box {
    animation: spin 5s linear infinite;
    box-shadow: 0 0 30px cyan;
}

@keyframes spin {
    from {transform: rotate(0deg);}
    to {transform: rotate(360deg);}
}

/* Text */
.status {
    margin-top: 15px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="card" onclick="togglePlay()">
    <div class="name">—͞Ꭺᴜʀꫝㅤ</div>

    <div class="img-box">
        <!-- 👉 এখানে তোমার pic link দিবা -->
        <img src="https://i.postimg.cc/NFXhFmXh/mosarof.jpg" id="cover">
    </div>

    <div class="status" id="status">Tap to Play</div>
</div>

<!-- 👉 এখানে তোমার song link দিবা -->
<audio id="audio" src="aura.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const card = document.querySelector(".card");
const statusText = document.getElementById("status");

function togglePlay() {
    if (audio.paused) {
        audio.play();
        card.classList.add("playing");
        statusText.innerText = "Playing...";
    } else {
        audio.pause();
        card.classList.remove("playing");
        statusText.innerText = "Paused";
    }
}
</script>

</body>
</html>
